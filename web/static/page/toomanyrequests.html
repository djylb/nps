<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body>
    <p id="msg"></p>
    <script>
        var e = "{error}";
        var m = document.getElementById("msg");
        if (e.indexOf("time limit exceeded") !== -1) {
            m.textContent = "Tunnel expired (time limit exceeded)";
        } else if (e.indexOf("flow limit exceeded") !== -1) {
            m.textContent = "Tunnel flow limit exceeded";
        } else {
            m.textContent = e;
        }
    </script>
</body>

</html>
